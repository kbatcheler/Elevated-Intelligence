openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: claims
    description: Phase 3 claim provenance reporting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /claims/report-broken:
    post:
      operationId: reportBrokenClaimLink
      tags: [claims]
      summary: Report a broken verified-claim source URL
      description: |
        Records a reader signal that a given verified claim's source URL is
        broken, paywalled, or otherwise unusable. Append-only, no de-dup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportBrokenClaimLinkInput"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportBrokenClaimLinkResult"
        "400":
          description: Invalid body
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReportBrokenClaimLinkInput:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
          nullable: true
        layerKey:
          type: string
          minLength: 1
          maxLength: 80
        claimPath:
          type: string
          minLength: 1
          maxLength: 200
        sourceUrl:
          type: string
          format: uri
          maxLength: 2000
      required:
        - layerKey
        - claimPath
        - sourceUrl
    ReportBrokenClaimLinkResult:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: string
          format: uuid
      required:
        - ok
        - id

